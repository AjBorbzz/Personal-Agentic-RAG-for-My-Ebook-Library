services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ebook_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage

  postgres:
    image: postgres:16
    container_name: ebook_postgres
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: ebook_rag
    ports:
      - "5433:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ebook_redis
    ports:
      - "6379:6379"